<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exersice Button</title>
</head>
<style>
    h3{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 30px;
    }
    .container{
        margin-top: 60px;
        margin-left: 15px;
    }
    button{
        padding: 12px 30px;
       margin-left: 25px;
       border-radius: 5px;
    }
    .btn1{
        background-color: blue;
        color: white;
        border: none;
        
        border-radius: 5px;
       
    }
    .btn2{
        background-color: black;
        border: none;
        color: white;
        
        border-radius: 5px;
    }
    .btn3{
        background-color: transparent;
        border: 1px solid black;
        border-radius: 50px;
        
    }
    .btn4{
        background-color: rgb(223, 25, 206);
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        border: none;
        
    }
    .btn4:hover{
        outline:2px solid rgb(6, 6, 54);
        background-color: blue;
    }
    .btn5{
        background-color: brown;
        color: black;
        transition: all 0.3s;
        border: none;
        cursor: pointer;
        
    }
    .btn5:hover{
        background-color: transparent;
        outline: 2px solid rgb(22, 9, 100);
    }
    .btn6{
        background-color: transparent;
        border-radius: 65px;
        color: blue;
        border: 2px solid blue;
        transition: all 0.3s;
        cursor: pointer;
    }
    .btn6:hover{
        background-color: black;
    }
    .btn7{
        background-color: aqua;
        border: none;
        cursor: pointer;
        transition: all 0.3s;
        
    }
    .btn7:hover{
        background-color: antiquewhite;
        transform: scale(1.1);
        outline: 2px solid red;
    }
    .btn8{
        background-color: rgb(19, 230, 15);
        color: rgb(48, 9, 122);
        border: none;
        transition: all 0.3s;
        cursor: pointer;
    }
    .btn8:hover{
        transform: rotate(10deg);
        background-color: transparent;
        outline: 2px solid black;
    }
    .btn9{
        background-color: rgb(83, 35, 131);
        color: white;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn9:hover{
        background-color: red;
        transform: scale(0.7);
        outline: 2px solid rgb(17, 122, 233);
    }
</style>
<body>
    <div>
        <h3 class="container">Primary</h3>
        <button class="btn1">Primary-btn</button>
        <button class="btn2">Primary-btn</button>
        <button class="btn3">Primary-btn</button>
    </div>
    <div>
        <h3 class="container">Primary</h3>
        <button class="btn4">Primary-btn</button>
        <button class="btn5">Primary-btn</button>
        <button class="btn6">Primary-btn</button>
    </div>
    <div>
        <h3 class="container">Primary</h3>
        <button class="btn7">Primary-btn</button>
        <button class="btn8">Primary-btn</button>
        <button class="btn9">Primary-btn</button>
    </div>
</body>
</html>
